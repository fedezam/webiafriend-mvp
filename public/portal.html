<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portalk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0c;
  --surface: #131316;
  --surface-raised: #1a1a1f;
  --border: #2a2a30;
  --accent: #00e676;
  --accent-dim: #00e67614;
  --accent-blue: #448aff;
  --accent-blue-dim: #448aff14;
  --accent-amber: #ffab40;
  --accent-amber-dim: #ffab4014;
  --accent-red: #ff5252;
  --accent-red-dim: #ff525214;
  --text: #e8e8ec;
  --text-muted: #6a6a75;
  --font-display: 'Space Grotesk', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 40px;
  line-height: 1.6;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 20%, #00e67606 0%, transparent 50%),
    radial-gradient(ellipse at 85% 80%, #448aff05 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ── Layout ─────────────────────────────────── */

.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

h1 {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.03em;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 6px;
  background: var(--accent-dim);
  border: 1px solid #00e67628;
  font-size: 11px;
  color: var(--accent);
}

.badge::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

#incomingAction {
  position: relative;
  z-index: 1;
  margin-bottom: 16px;
}

.toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  position: relative;
  z-index: 1;
}

@media (max-width: 800px) {
  body { padding: 16px; }
  .grid { grid-template-columns: 1fr; }
}

/* ── Cards ───────────────────────────────────── */

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
}

.card-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

/* ── Action panels ───────────────────────────── */

.panel {
  border-radius: var(--radius);
  padding: 20px 24px;
  animation: slideIn 0.25s ease;
  border: 1px solid transparent;
}

.panel-green  { background: var(--accent-dim);  border-color: #00e67628; }
.panel-blue   { background: var(--accent-blue-dim); border-color: #448aff28; }
.panel-amber  { background: var(--accent-amber-dim); border-color: #ffab4028; }
.panel-red    { background: var(--accent-red-dim);  border-color: #ff525228; }
.panel-neutral { background: var(--surface); border-color: var(--border); }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.panel-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}

.panel-row {
  font-size: 13px;
  color: var(--text-muted);
  padding: 3px 0;
}

.panel-row b { color: var(--text); font-weight: 500; }

.panel-row a {
  color: var(--accent-blue);
  text-decoration: none;
}

.panel-row a:hover { text-decoration: underline; }

/* ── Buttons ─────────────────────────────────── */

button {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 7px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s ease;
}

button:hover {
  border-color: var(--text-muted);
  color: var(--text);
  background: var(--surface-raised);
}

.btn-primary {
  background: var(--accent);
  color: #0a0a0c;
  border: none;
  padding: 10px 22px;
  border-radius: 7px;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  margin-top: 14px;
  letter-spacing: 0;
}

.btn-primary:hover {
  background: #33eb91;
  transform: translateY(-1px);
  box-shadow: 0 4px 18px #00e67628;
  color: #0a0a0c;
}

.btn-primary.amber { background: var(--accent-amber); }
.btn-primary.amber:hover { background: #ffc570; box-shadow: 0 4px 18px #ffab4028; color: #0a0a0c; }
.btn-primary.blue  { background: var(--accent-blue); }
.btn-primary.blue:hover  { background: #6aa3ff; box-shadow: 0 4px 18px #448aff28; color: #0a0a0c; }

/* ── Memory textarea ─────────────────────────── */

.memory-textarea {
  width: 100%;
  min-height: 120px;
  background: #0d0d10;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 12px;
  resize: vertical;
  margin-top: 10px;
  line-height: 1.6;
  outline: none;
}

.memory-textarea:focus {
  border-color: #00e67640;
}

/* ── Pre / logs ──────────────────────────────── */

pre {
  font-family: var(--font-mono);
  font-size: 11px;
  background: #0d0d10;
  color: var(--accent);
  padding: 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  overflow: auto;
  max-height: 240px;
  line-height: 1.5;
}

.log-line {
  padding: 4px 0;
  border-bottom: 1px solid #1a1a1f;
  font-size: 11px;
  color: var(--text-muted);
}

.log-line:last-child { border-bottom: none; }

.timeline-item {
  padding: 7px 0;
  border-bottom: 1px solid #1a1a1f;
  font-size: 12px;
}

.timeline-item:last-child { border-bottom: none; }
.timeline-item b { color: var(--accent-blue); font-weight: 500; }
.timeline-item .ts { color: var(--text-muted); font-size: 10px; }

.empty { color: var(--text-muted); font-size: 11px; font-style: italic; padding: 8px 0; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>Portalk</h1>
  <span class="badge" id="entityBadge">runtime</span>
</div>

<div id="incomingAction"></div>

<div class="toolbar">
  <button onclick="exportMemory()">Exportar memoria</button>
  <button onclick="clearMemory()">Limpiar memoria</button>
  <button onclick="window.location.href='memory.html'">Editor de memoria →</button>
</div>

<div class="grid">
  <div class="card">
    <div class="card-label">Estado</div>
    <pre id="stateView"></pre>
  </div>
  <div class="card">
    <div class="card-label">Memoria local</div>
    <pre id="memoryView"></pre>
  </div>
  <div class="card">
    <div class="card-label">Timeline</div>
    <div id="timeline"></div>
  </div>
  <div class="card">
    <div class="card-label">Logs</div>
    <div id="logs"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// ACTION REGISTRY
// Para agregar una acción nueva: una entrada acá.
// ═══════════════════════════════════════════════

const ACTIONS = {

  create_appointment: {
    title: "📅 Agendar turno",
    color: "panel-blue",
    btnColor: "blue",
    btnLabel: "Confirmar y agendar en Google Calendar",
    fields: [
      { key: "name",    label: "Cliente"  },
      { key: "service", label: "Servicio" },
      { key: "date",    label: "Fecha"    },
      { key: "time",    label: "Hora"     },
      { key: "notes",   label: "Notas"    },
    ],
    execute: p => `/api/portalk?action=calendar&${qs(p)}`
  },

  create_payment: {
    title: "💳 Confirmar pago",
    color: "panel-amber",
    btnColor: "amber",
    btnLabel: "Pagar con Mercado Pago",
    fields: [
      { key: "description", label: "Servicio" },
      { key: "amount",      label: "Importe", prefix: "$" },
      { key: "name",        label: "Cliente"  },
      { key: "payer_email", label: "Email"    },
    ],
    execute: p => `/api/portalk?action=payment&${qs(p)}`
  },

  create_issue: {
    title: "🐛 Crear issue en GitHub",
    color: "panel-neutral",
    btnColor: "",
    btnLabel: "Crear issue",
    fields: [
      { key: "repo",  label: "Repo"        },
      { key: "title", label: "Título"      },
      { key: "body",  label: "Descripción" },
      { key: "label", label: "Label"       },
    ],
    execute: p => `/api/portalk?action=github_issue&${qs(p)}`
  },

  memory_write: {
    title: "💾 Guardar en memoria",
    color: "panel-green",
    btnColor: "",
    btnLabel: "Guardar",
    fields: [
      { key: "entity", label: "Entidad" },
      { key: "key",    label: "Clave"   },
    ],
    // execute se sobreescribe abajo para incluir el textarea
    execute: null
  },

};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════

const STORAGE_KEY = "portalk_state";

let state = (() => {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { entity: "demo", actions: [], memory: {}, logs: [] };
})();

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  render();
}

function log(msg) {
  state.logs.unshift({ ts: new Date().toISOString(), message: msg });
  state.logs = state.logs.slice(0, 100);
  saveState();
}

// ═══════════════════════════════════════════════
// INCOMING ACTION HANDLER
// ═══════════════════════════════════════════════

function receiveAction() {
  const params = new URLSearchParams(window.location.search);
  const action = params.get("action");
  const status = params.get("status");
  const mode   = params.get("mode");
  const el     = document.getElementById("incomingAction");

  // ── Setup OAuth ──────────────────────────────
  if (mode === "setup") {
    el.innerHTML = panel("panel-blue", "Conectar Google Calendar",
      `<p class="panel-row">Conectá tu cuenta una sola vez para habilitar turnos automáticos.</p>
       <button class="btn-primary blue" onclick="window.location.href='/api/auth/google?mode=setup'">
         Conectar Google Calendar
       </button>`);
    return;
  }

  // ── Status returns ───────────────────────────
  const STATUS_MAP = {
    ok:              { color: "panel-green", icon: "✅", title: "Turno agendado",
      body: p => link(p.get("event"), "Ver en Google Calendar →") },
    github_ok:       { color: "panel-green", icon: "✅", title: "Issue creado",
      body: p => `<p class="panel-row"><b>${esc(p.get("title"))}</b></p>` + link(p.get("issue_url"), `Ver issue #${p.get("issue_number")} →`) },
    memory_ok:       { color: "panel-green", icon: "💾", title: "Guardado en memoria",
      body: p => `<p class="panel-row"><b>Entidad:</b> ${esc(p.get("entity"))}</p><p class="panel-row"><b>Clave:</b> ${esc(p.get("key"))}</p>` },
    payment_ok:      { color: "panel-green", icon: "✅", title: "Pago confirmado",
      body: p => rows({ Cliente: p.get("name"), Servicio: p.get("description"), Importe: "$" + p.get("amount") }) },
    payment_fail:    { color: "panel-red",   icon: "❌", title: "Pago no completado",
      body: () => `<p class="panel-row">Podés reintentar desde el enlace original.</p>` },
    payment_pending: { color: "panel-amber", icon: "⏳", title: "Pago pendiente",
      body: () => `<p class="panel-row">El pago está siendo procesado.</p>` },
  };

  if (status && STATUS_MAP[status]) {
    const s = STATUS_MAP[status];
    log(`STATUS: ${status}`);
    el.innerHTML = panel(s.color, `${s.icon} ${s.title}`, s.body(params));
    saveState();
    return;
  }

  if (!action) return;

  // ── Pending action ───────────────────────────
  const payload = {};
  for (const [k, v] of params.entries()) {
    if (k !== "action") payload[k] = v;
  }

  log(`ACTION_RECEIVED: ${action}`);

  const def = ACTIONS[action];

  if (!def) {
    // Acción genérica desconocida
    el.innerHTML = panel("panel-neutral", `Acción: ${esc(action)}`,
      `<pre>${JSON.stringify(payload, null, 2)}</pre>
       <button class="btn-primary" id="executeBtn">Ejecutar</button>`);
    document.getElementById("executeBtn").onclick = () => executeGeneric(action, payload);
    return;
  }

  // Renderizado desde el registry
  const fieldRows = def.fields
    .filter(f => payload[f.key])
    .map(f => `<p class="panel-row"><b>${f.label}:</b> ${f.prefix || ""}${esc(payload[f.key])}</p>`)
    .join("");

  // memory_write: agrega textarea para el valor largo
  const extraHtml = action === "memory_write"
    ? `<textarea class="memory-textarea" id="memoryContent" placeholder="Escribí o pegá el contenido aquí...">${esc(payload.value || "")}</textarea>`
    : "";

  el.innerHTML = panel(def.color, def.title,
    `${fieldRows}${extraHtml}
     <button class="btn-primary ${def.btnColor}" id="executeBtn">${def.btnLabel}</button>`);

  document.getElementById("executeBtn").onclick = () => {
    if (action === "memory_write") {
      const value = document.getElementById("memoryContent").value;
      const p = new URLSearchParams({ ...payload, value });
      window.location.href = `/api/portalk?action=memory_write&${p.toString()}`;
    } else {
      window.location.href = def.execute(payload);
    }
  };
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════

function panel(color, title, body) {
  return `<div class="panel ${color}">
    <div class="panel-title">${title}</div>
    ${body}
  </div>`;
}

function rows(obj) {
  return Object.entries(obj)
    .filter(([, v]) => v)
    .map(([k, v]) => `<p class="panel-row"><b>${k}:</b> ${esc(v)}</p>`)
    .join("");
}

function link(url, label) {
  if (!url) return "";
  return `<p class="panel-row"><a href="${esc(url)}" target="_blank">${label}</a></p>`;
}

function qs(obj) {
  return new URLSearchParams(obj).toString();
}

function esc(str) {
  return String(str || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function executeGeneric(action, payload) {
  const record = {
    id: crypto.randomUUID(),
    action, payload,
    status: "completed",
    timestamp: new Date().toISOString()
  };
  state.actions.unshift(record);
  Object.assign(state.memory, payload);
  log(`ACTION_EXECUTED: ${action}`);
  saveState();
  document.getElementById("incomingAction").innerHTML =
    panel("panel-green", "✅ Ejecutado", `<pre>${JSON.stringify(record, null, 2)}</pre>`);
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════

function render() {
  document.getElementById("entityBadge").textContent = state.entity;
  document.getElementById("stateView").textContent = JSON.stringify({
    acciones: state.actions.length,
    logs: state.logs.length
  }, null, 2);
  document.getElementById("memoryView").textContent =
    JSON.stringify(state.memory, null, 2);

  document.getElementById("timeline").innerHTML =
    state.actions.length === 0
      ? '<div class="empty">Sin acciones aún</div>'
      : state.actions.map(a => `
          <div class="timeline-item">
            <b>${esc(a.action)}</b>
            <span class="ts"> — ${a.timestamp}</span>
          </div>`).join("");

  document.getElementById("logs").innerHTML =
    state.logs.length === 0
      ? '<div class="empty">Sin logs</div>'
      : state.logs.map(l => `
          <div class="log-line">[${l.ts.slice(11,19)}] ${esc(l.message)}</div>`).join("");
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════

function exportMemory() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "portalk_memory.json"; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function clearMemory() {
  if (!confirm("¿Eliminar toda la memoria local?")) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  location.reload();
}

render();
receiveAction();
</script>
</body>
</html>
