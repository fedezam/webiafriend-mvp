<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entity Runtime</title>
<style>
body{font-family:system-ui,sans-serif;max-width:1200px;margin:20px auto;padding:20px;background:#f5f5f5}
h1,h2,h3{margin-top:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
pre{background:#111;color:#0f0;padding:12px;border-radius:8px;overflow:auto}
button{padding:10px 16px;margin:5px;cursor:pointer}
.badge{display:inline-block;padding:6px 10px;border-radius:20px;background:#ddd;font-size:12px}
.log{padding:6px 0;border-bottom:1px solid #eee}
.timeline-item{padding:8px 0;border-bottom:1px solid #eee}
.btn-confirm{background:#4CAF50;color:white;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer}
.btn-confirm:hover{background:#45a049}
.status-ok{background:#e8f5e9;border-left:4px solid #4CAF50;padding:12px;border-radius:4px}
.status-setup{background:#e3f2fd;border-left:4px solid #2196F3;padding:12px;border-radius:4px}
</style>
</head>
<body>

<h1>🧠 Entity Runtime</h1>

<div class="badge" id="entityName">entity: runtime</div>

<div id="incomingAction"></div>

<br>

<button onclick="exportMemory()">Exportar memoria</button>
<button onclick="clearMemory()">Limpiar memoria</button>

<br><br>

<div class="grid">
  <div class="card">
    <h2>Estado</h2>
    <pre id="stateView"></pre>
  </div>
  <div class="card">
    <h2>Memoria</h2>
    <pre id="memoryView"></pre>
  </div>
  <div class="card">
    <h2>Timeline</h2>
    <div id="timeline"></div>
  </div>
  <div class="card">
    <h2>Logs</h2>
    <div id="logs"></div>
  </div>
</div>

<script>

const STORAGE_KEY = "entity_runtime_state";

let state = loadState();

function loadState(){
  try {
    const existing = localStorage.getItem(STORAGE_KEY);
    if(existing) return JSON.parse(existing);
  } catch(e){
    console.warn("localStorage unavailable", e);
  }
  return { entity:"demo_entity", actions:[], memory:{}, logs:[] };
}

function saveState(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e){
    console.warn("localStorage write failed", e);
  }
  render();
}

function log(message){
  state.logs.unshift({ ts: new Date().toISOString(), message });
  state.logs = state.logs.slice(0, 100);
  saveState();
}

function receiveAction(){
  const params = new URLSearchParams(window.location.search);
  const action = params.get("action");
  const status = params.get("status");
  const mode = params.get("mode");

  // Modo setup — el comercio conecta su calendar
  if(mode === "setup"){
    document.getElementById("incomingAction").innerHTML = `
      <div class="card status-setup">
        <h2>⚙️ Configuración del comercio</h2>
        <p>Conectá tu Google Calendar para que los turnos aparezcan automáticamente.<br>
        Solo necesitás hacerlo una vez.</p>
        <button class="btn-confirm" onclick="window.location.href='/api/auth/google?mode=setup'">
          Conectar mi Google Calendar
        </button>
      </div>`;
    return;
  }

  // Retorno exitoso desde OAuth
  if(status === "ok"){
    const name = params.get("name") || "Cliente";
    const eventLink = params.get("event") || "";
    log("CALENDAR_EVENT_CREATED");
    document.getElementById("incomingAction").innerHTML = `
      <div class="card status-ok">
        <h2>✅ Turno agendado en Google Calendar</h2>
        <p>El turno de <b>${escapeHtml(name)}</b> fue creado exitosamente.</p>
        ${eventLink ? `<p><a href="${escapeHtml(eventLink)}" target="_blank">Ver en Google Calendar →</a></p>` : ""}
      </div>`;
    saveState();
    return;
  }

  if(!action) return;

  const payload = {};
  for(const [k,v] of params.entries()){
    if(k !== "action") payload[k] = v;
  }

  log(`ACTION_RECEIVED: ${action}`);

  if(action === "view_memory"){
    document.getElementById("incomingAction").innerHTML = `
      <div class="card">
        <h2>📖 View Memory</h2>
        <pre>${JSON.stringify(state.memory, null, 2)}</pre>
      </div>`;
    return;
  }

  window.pendingAction = { action, payload };

  if(action === "create_appointment"){
    document.getElementById("incomingAction").innerHTML = `
      <div class="card">
        <h2>📅 Agendar turno</h2>
        <p><b>Cliente:</b> ${escapeHtml(payload.name || "-")}</p>
        <p><b>Servicio:</b> ${escapeHtml(payload.service || "-")}</p>
        <p><b>Fecha:</b> ${escapeHtml(payload.date || "-")}</p>
        <p><b>Hora:</b> ${escapeHtml(payload.time || "-")}</p>
        ${payload.notes ? `<p><b>Notas:</b> ${escapeHtml(payload.notes)}</p>` : ""}
        <button class="btn-confirm" id="executeBtn">Confirmar y agendar en Google Calendar</button>
      </div>`;
  } else {
    document.getElementById("incomingAction").innerHTML = `
      <div class="card">
        <h2>Acción detectada</h2>
        <p><b>${escapeHtml(action)}</b></p>
        <pre>${JSON.stringify(payload, null, 2)}</pre>
        <button id="executeBtn">Ejecutar acción</button>
      </div>`;
  }

  document.getElementById("executeBtn")
    .addEventListener("click", executeAction);
}

function executeAction(){
  if(!window.pendingAction) return;

  const { action, payload } = window.pendingAction;

  // ✅ FIX: Ir directo a /api/calendar/create, NO a /api/auth/google
  // El comercio ya autorizó OAuth en el setup. El usuario no vuelve a pasar por OAuth.
  if(action === "create_appointment"){
    const params = new URLSearchParams({ action, ...payload });
    window.location.href = `/api/calendar/create?${params.toString()}`;
    return;
  }

  const record = {
    id: crypto.randomUUID(),
    action,
    payload,
    status: "completed",
    timestamp: new Date().toISOString()
  };

  state.actions.unshift(record);
  Object.assign(state.memory, payload);

  log(`ACTION_EXECUTED: ${action}`);
  log(`MEMORY_UPDATED`);

  saveState();

  document.getElementById("incomingAction").innerHTML = `
    <div class="card">
      <h2>✅ Acción ejecutada</h2>
      <pre>${JSON.stringify(record, null, 2)}</pre>
    </div>`;
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function render(){
  document.getElementById("entityName").textContent = `entity: ${state.entity}`;
  document.getElementById("stateView").textContent = JSON.stringify({
    actions: state.actions.length,
    logs: state.logs.length
  }, null, 2);
  document.getElementById("memoryView").textContent = JSON.stringify(state.memory, null, 2);
  document.getElementById("timeline").innerHTML =
    state.actions.map(a => `
      <div class="timeline-item">
        <b>${escapeHtml(a.action)}</b><br>
        ${a.timestamp}
      </div>`).join("");
  document.getElementById("logs").innerHTML =
    state.logs.map(l => `
      <div class="log">
        [${l.ts}] ${escapeHtml(l.message)}
      </div>`).join("");
}

function exportMemory(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "entity_memory.json";
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function clearMemory(){
  if(!confirm("¿Eliminar toda la memoria?")) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
  location.reload();
}

render();
receiveAction();

</script>
</body>
</html>
