<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portalk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
</head>
<body>

  <div class="main-container">

    <!-- Header -->
    <div class="header-row">
      <h1>Portalk <span class="badge" id="entityBadge">demo</span></h1>
      <div style="display:flex; gap:6px;">
        <button onclick="exportMemory()">Exportar JSON</button>
        <button onclick="clearMemory()" style="color:var(--accent-red); border-color:#ff525240;">Reset</button>
      </div>
    </div>

    <!-- Connectors bar -->
    <div class="connectors-bar">
      <span class="conn-label">Connectors:</span>
      <div id="connectorsBody" style="display:flex; flex-wrap:wrap; gap:6px;"></div>
    </div>

    <!-- Acción entrante (panel dinámico) -->
    <div id="incomingAction"></div>

    <!-- Dashboard -->
    <div class="dashboard-grid">

      <div class="card">
        <div class="card-header">
          <span>Estado</span>
          <span id="actionCount">0</span>
        </div>
        <div class="card-content">
          <pre id="stateView"></pre>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span>Memoria Local</span></div>
        <div class="card-content">
          <pre id="memoryView"></pre>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span>Actividad Reciente</span></div>
        <div class="card-content" id="logsView"></div>
      </div>

    </div>

  </div>

  <script src="portal.js"></script>
</body>
</html>
