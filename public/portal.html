<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portalk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0c;
  --surface: #131316;
  --surface-raised: #1a1a1f;
  --border: #2a2a30;
  --accent: #00e676;
  --accent-dim: #00e67614;
  --accent-blue: #448aff;
  --accent-blue-dim: #448aff14;
  --accent-amber: #ffab40;
  --accent-amber-dim: #ffab4014;
  --accent-red: #ff5252;
  --accent-red-dim: #ff525214;
  --text: #e8e8ec;
  --text-muted: #6a6a75;
  --font-display: 'Space Grotesk', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-mono);
  font-size: 12px; /* Fuente base más pequeña */
  background: var(--bg);
  color: var(--text);
  height: 100vh; /* Ocupa toda la altura */
  overflow: hidden; /* Sin scroll global en PC */
  display: flex;
  flex-direction: column;
  padding: 12px 16px;
  line-height: 1.4;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 15% 20%, #00e67606 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ── Layout Principal ─────────────────────────── */

.main-container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  gap: 10px;
}

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

h1 {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.03em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--accent-dim);
  border: 1px solid #00e67628;
  font-size: 10px;
  color: var(--accent);
  text-transform: uppercase;
}

.badge::before {
  content: '';
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease infinite;
}

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ── Connectors Compactos (Barra Horizontal) ─── */

.connectors-mini {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  font-size: 11px;
}

.conn-label {
  color: var(--text-muted);
  font-weight: 600;
  margin-right: 4px;
  text-transform: uppercase;
  font-size: 9px;
  letter-spacing: 0.05em;
}

.conn-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 6px;
  border-radius: 4px;
  background: #0d0d10;
  border: 1px solid var(--border);
}

.conn-dot { width: 6px; height: 6px; border-radius: 50%; }
.conn-dot.on { background: var(--accent); box-shadow: 0 0 4px var(--accent); }
.conn-dot.off { background: var(--text-muted); }

.conn-toggle {
  cursor: pointer;
  font-size: 9px;
  padding: 1px 4px;
  border-radius: 3px;
  border: 1px solid transparent;
  color: var(--text-muted);
}
.conn-toggle.auto { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* ─ Action Area (Blogger/etc) ────────────────── */

#incomingAction {
  flex: 0 0 auto;
  min-height: 0;
}

.panel {
  border-radius: var(--radius);
  padding: 12px 16px;
  border: 1px solid transparent;
  animation: slideIn 0.2s ease;
}

.panel-green  { background: var(--accent-dim);  border-color: #00e67628; }
.panel-blue   { background: var(--accent-blue-dim); border-color: #448aff28; }
.panel-amber  { background: var(--accent-amber-dim); border-color: #ffab4028; }
.panel-neutral { background: var(--surface); border-color: var(--border); }

@keyframes slideIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.panel-title {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.panel-row { font-size: 12px; color: var(--text-muted); padding: 2px 0; }
.panel-row b { color: var(--text); font-weight: 500; }

/* Inputs compactos */
.memory-textarea {
  width: 100%;
  min-height: 60px;
  max-height: 80px;
  background: #0d0d10;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 8px;
  resize: none;
  margin: 8px 0;
  outline: none;
}

/* Countdown bar compacto */
.countdown-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}
.countdown-bar-bg { flex: 1; height: 3px; background: var(--border); border-radius: 2px; }
.countdown-bar { height: 3px; background: var(--accent); border-radius: 2px; transition: width 0.1s linear; }
.countdown-label { font-size: 10px; color: var(--text-muted); width: 25px; text-align: right; }

/* ─ Buttons ─────────────────────────────────── */

button {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s ease;
}
button:hover { border-color: var(--text-muted); color: var(--text); background: var(--surface-raised); }

.btn-primary {
  background: var(--accent);
  color: #0a0a0c;
  border: none;
  padding: 6px 16px;
  border-radius: 4px;
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 600;
  margin-left: auto;
}
.btn-primary:hover { background: #33eb91; transform: translateY(-1px); }
.btn-primary.blue { background: var(--accent-blue); }
.btn-primary.amber { background: var(--accent-amber); }
.btn-cancel { background: var(--accent-red-dim); color: var(--accent-red); border-color: var(--accent-red); margin-right: 8px; }

/* ── Dashboard Grid ───────────────────────────── */

.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr; /* 3 columnas en PC */
  gap: 10px;
  flex: 1; /* Ocupa el resto del alto disponible */
  min-height: 0; /* Permite scroll interno */
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.card-header {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}

.card-content {
  flex: 1;
  overflow-y: auto;
  font-size: 11px;
}

/* Scrollbars finos */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

pre {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  white-space: pre-wrap;
  word-break: break-all;
}

.log-line, .timeline-item {
  padding: 3px 0;
  border-bottom: 1px solid #1a1a1f;
  font-size: 10px;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
}
.timeline-item b { color: var(--accent-blue); }

/* ── Mobile Responsive ────────────────────────── */

@media (max-width: 768px) {
  body { height: auto; overflow: auto; padding: 10px; }
  .main-container { height: auto; }
  
  .dashboard-grid {
    grid-template-columns: 1fr; /* 1 columna en móvil */
    grid-template-rows: repeat(3, 150px); /* Altura fija para scrolls internos */
  }
  
  .connectors-mini { flex-direction: column; align-items: stretch; gap: 6px; }
  .conn-item { justify-content: space-between; }
  
  h1 { font-size: 18px; }
  .panel { padding: 10px; }
  .btn-primary { width: 100%; margin-top: 8px; margin-left: 0; }
  .countdown-wrap { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="main-container">
  
  <!-- Header & Connectors Integrados -->
  <div class="header-row">
    <h1>Portalk <span class="badge" id="entityBadge">runtime</span></h1>
    <div style="display:flex; gap:6px;">
       <button onclick="exportMemory()">Exportar JSON</button>
       <button onclick="clearMemory()" style="color:var(--accent-red); border-color:var(--accent-red-dim)">Reset</button>
    </div>
  </div>

  <div class="connectors-mini" id="connectorsPanel">
    <span class="conn-label">Connectors:</span>
    <div id="connectorsBody" style="display:flex; flex-wrap:wrap; gap:6px;"></div>
  </div>

  <!-- Área de Acción Principal (Blogger, etc) -->
  <div id="incomingAction"></div>

  <!-- Grid Inferior -->
  <div class="dashboard-grid">
    
    <div class="card">
      <div class="card-header"><span>Estado</span> <span id="actionCount">0</span></div>
      <div class="card-content"><pre id="stateView"></pre></div>
    </div>

    <div class="card">
      <div class="card-header"><span>Memoria Local</span></div>
      <div class="card-content"><pre id="memoryView"></pre></div>
    </div>

    <div class="card">
      <div class="card-header"><span>Actividad Reciente</span></div>
      <div class="card-content" id="timeline"></div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// LOGICA JS (Misma lógica, adaptada al nuevo DOM)
// ═══════════════════════════════════════════════

const ACTIONS = {
  blogger_post: {
    title: "📝 Publicar en Blogger",
    color: "panel-green",
    btnColor: "",
    btnLabel: "Publicar Ahora",
    fields: [
      { key: "title",   label: "Título"  },
      { key: "labels",  label: "Labels"  },
    ],
    execute: null
  },
  // ... otros actions si los necesitas
};

const STORAGE_KEY = "portalk_state";
let state = (() => {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { entity: "demo", actions: [], memory: {}, logs: [], connectorModes: {} };
})();

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  render();
}

function log(msg) {
  state.logs.unshift({ ts: new Date().toISOString(), message: msg });
  state.logs = state.logs.slice(0, 50); // Menos logs para rendimiento
  saveState();
}

function receiveAction() {
  const params = new URLSearchParams(window.location.search);
  const action = params.get("action");
  const status = params.get("status");
  const el     = document.getElementById("incomingAction");

  if (!action && !status) {
     el.innerHTML = `<div class="panel panel-neutral" style="text-align:center; color:var(--text-muted); padding:10px;">
        Sistema listo. Esperando acción...
     </div>`;
     return;
  }

  // Simulación de Blogger Post para demo visual
  if (action === "blogger_post") {
    const payload = {};
    for (const [k, v] of params.entries()) if (k !== "action") payload[k] = v;
    
    const def = ACTIONS[action] || { title: action, color: "panel-neutral", btnLabel: "Ejecutar" };
    const fieldRows = def.fields ? def.fields.filter(f => payload[f.key]).map(f => `<p class="panel-row"><b>${f.label}:</b> ${esc(payload[f.key])}</p>`).join("") : "";
    
    // Countdown logic simplificado
    el.innerHTML = `<div class="panel ${def.color}">
      <div class="panel-title">${def.title} <span style="font-size:10px; opacity:0.7">Auto-publish enabled</span></div>
      ${fieldRows}
      <textarea class="memory-textarea" id="memoryContent" placeholder="Contenido del post...">${esc(payload.content || "")}</textarea>
      <div class="countdown-wrap">
        <div class="countdown-bar-bg"><div class="countdown-bar" id="cbar" style="width:100%"></div></div>
        <span class="countdown-label" id="clabel">5s</span>
        <button class="btn-cancel" id="cancelBtn">Cancelar</button>
        <button class="btn-primary ${def.btnColor}" id="executeBtn">${def.btnLabel}</button>
      </div>
    </div>`;

    let remaining = 5;
    let cancelled = false;
    const interval = setInterval(() => {
      remaining -= 0.1;
      document.getElementById("cbar").style.width = (remaining/5)*100 + "%";
      document.getElementById("clabel").textContent = Math.ceil(remaining) + "s";
      if (remaining <= 0 && !cancelled) { clearInterval(interval); doExecute(); }
    }, 100);

    document.getElementById("cancelBtn").onclick = () => {
      cancelled = true; clearInterval(interval);
      document.getElementById("cbar").style.width = "0%";
      document.getElementById("clabel").textContent = "Cancelado";
    };
    
    document.getElementById("executeBtn").onclick = () => {
      cancelled = true; clearInterval(interval); doExecute();
    };

    function doExecute() {
      log(`ACTION_EXECUTED: ${action}`);
      el.innerHTML = `<div class="panel panel-green"><div class="panel-title">✅ Publicado</div><p class="panel-row">El post ha sido enviado a Blogger.</p></div>`;
      setTimeout(() => el.innerHTML = '', 3000); // Limpiar después de 3s
    }
  }
}

// Helpers
function esc(str) { return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function render() {
  document.getElementById("entityBadge").textContent = state.entity;
  document.getElementById("actionCount").textContent = state.actions.length;
  
  document.getElementById("stateView").textContent = JSON.stringify({
    uptime: "active",
    actions: state.actions.length,
    mode: "compact"
  }, null, 2);

  document.getElementById("memoryView").textContent = 
    Object.keys(state.memory).length ? JSON.stringify(state.memory, null, 2) : "// Vacío";

  document.getElementById("timeline").innerHTML = 
    state.logs.map(l => `<div class="timeline-item"><span>${esc(l.message)}</span><span class="ts">${l.ts.slice(11,16)}</span></div>`).join("");

  renderConnectors();
}

function renderConnectors() {
  const CONNECTORS = [
    { id: "calendar", label: "G-Cal", on: true },
    { id: "blogger", label: "Blogger", on: true },
    { id: "github", label: "GitHub", on: false },
    { id: "mpago", label: "MPago", on: true },
  ];
  
  if(!state.connectorModes) state.connectorModes = {};

  document.getElementById("connectorsBody").innerHTML = CONNECTORS.map(c => {
    const isAuto = state.connectorModes[c.id] === "auto";
    return `<div class="conn-item">
      <div style="display:flex; align-items:center; gap:6px;">
        <div class="conn-dot ${c.on ? 'on' : 'off'}"></div>
        <span>${c.label}</span>
      </div>
      <span class="conn-toggle ${isAuto ? 'auto' : ''}" onclick="toggleConn('${c.id}')">
        ${isAuto ? 'AUTO' : 'MAN'}
      </span>
    </div>`;
  }).join("");
}

function toggleConn(id) {
  state.connectorModes[id] = state.connectorModes[id] === "auto" ? "manual" : "auto";
  saveState();
}

function exportMemory() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "portalk.json"; a.click();
}

function clearMemory() {
  if(confirm("¿Resetear todo?")) { localStorage.removeItem(STORAGE_KEY); location.reload(); }
}

// Init
render();
receiveAction();
</script>
</body>
</html>
